<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>html5 炫酷新特性Canvas画布</title>
</head>

<body>
  <canvas id="myCanvas" width="600" height="400" style="border: 1px solid #333;">
    您的浏览器不支持 canvas 标签。(旧IE会显示这个文字)
  </canvas>
  <script>
    // 画布元素
    const canvas = document.querySelector('#myCanvas');
    // 绘制的上下文对象
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#4299e1';// 填充颜色
    ctx.fillRect(20, 20, 100, 80);// 填充矩形
    ctx.strokeStyle = '#f56565';// 边框颜色
    ctx.lineWidth = 4;// 边框宽度
    ctx.strokeRect(150, 20, 100, 80);// 边框矩形
    ctx.clearRect(50, 50, 40, 30);// 清除矩形
  </script>
</body>

</html>
